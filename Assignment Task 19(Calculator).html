<html>
    <head>
        <style>
            .tb
            {
                width: 800px;
                height: 500px;
                font-size: 30px;
                text-align: center;
                margin: 0px auto;
            }
            .col
            {
                background-color: rgb(92, 214, 255);
            }
            .row1
            {
                background-color: rgb(215, 215, 215);
            }
            #lst
            {
                background-color: rgb(215, 215, 215);
            }
            h2{
                text-align: center;
            }
        </style>
    </head>
<body>
    <h2> 19. </h2>
    <table class="tb" border="n" >
        <!-- Row 1 -->
        <tr class="row1">
            <td>Red</td>
            <td>deg</td>
            <td>x!</td>
            <td>(</td>
            <td>)</td>
            <td>%</td>
            <td id="lst">AC</td>
        </tr>

        <tr>
            <td>Inv</td>

            <td>In</td>
            <td>&nbsp;7&nbsp;</td>

        </tr>

            <td>3.14</td>

            <td>log</td>

            <td>Ans</td>

            <td>x<sup>y</sup></td>
            <td>&nbsp;0&nbsp;</td>
            <td>.</td>
            <td>+</td>
            <td class="col">=</td>
        </tr>
    </table>
</body>
</html>
