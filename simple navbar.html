<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Dropdown Menu</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 50px;
    }

    /* Main nav bar */
    ul.navbar {
      list-style: none;
      background-color: black;
      display: flex;
    }

    ul.navbar > li {
      position: relative;
    }

    ul.navbar > li > a {
      display: block;
      color: white;
      background-color: black;
      padding: 14px 20px;
      text-decoration: none;
      position: relative;
    }

    /* Arrow for submenu */
    ul.navbar > li.has-submenu > a::after {
      content: " ▼";
      font-size: 12px;
    }

    ul.navbar > li > a:hover {
      background-color: red;
    }

    /* Submenu basic styling */
    ul.submenu {
      position: absolute;
      top: 100%;
      left: 0;
      background-color: red;
      list-style: none;
      min-width: 160px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      z-index: 1;
    }

    ul.submenu li a {
      display: block;
      color: white;
      padding: 12px 16px;
      text-decoration: none;
    }

    ul.submenu li a:hover {
      background-color: black;
    }

    /* Show submenu with animation */
    li:hover .submenu {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <ul class="navbar">
    <!-- Support -->
    <li class="has-submenu">
      <a href="#">Support</a>
      <ul class="submenu">
        <li><a href="#">Help Desk</a></li>
        <li><a href="#">Live Chat</a></li>
        <li><a href="#">Documentation</a></li>
      </ul>
    </li>

    <!-- Web Design -->
    <li class="has-submenu">
      <a href="#">Web Design</a>
      <ul class="submenu">
        <li><a href="#">UI/UX</a></li>
        <li><a href="#">Graphics</a></li>
        <li><a href="#">Templates</a></li>
        <li><a href="#">Animations</a></li>
      </ul>
    </li>

    <!-- Content Management -->
    <li class="has-submenu">
      <a href="#">Content Management</a>
      <ul class="submenu">
        <li><a href="#">Joomla</a></li>
        <li><a href="#">Drupal</a></li>
        <li><a href="#">WordPress</a></li>
        <li><a href="#">Concrete 5</a></li>
      </ul>
    </li>

    <!-- Contact -->
    <li class="has-submenu">
      <a href="#">Contact</a>
      <ul class="submenu">
        <li><a href="#">Email</a></li>
        <li><a href="#">Phone</a></li>
        <li><a href="#">Map</a></li>
      </ul>
    </li>
  </ul>

</body>
</html>
