<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Level Dropdown Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #00BFFF; /* Light blue background */
      margin: 0;
      padding: 0;
    }

    /* Top-level menu */
    ul.menu {
      list-style: none;
      background: #000;
      padding: 0;
      margin: 0;
      display: flex;
    }

    ul.menu li {
      position: relative;
    }

    ul.menu > li {
      float: left;
    }

    ul.menu li a {
      display: block;
      padding: 14px 20px;
      color: white;
      text-decoration: none;
      white-space: nowrap;
    }

    ul.menu li a:hover {
      background: #333;
    }

    /* First-level submenu */
    ul.menu li ul {
      display: none;
      position: absolute;
      background: #000;
      margin: 0;
      padding: 0;
      top: 100%;
      left: 0;
      min-width: 160px;
      z-index: 1000;
    }

    /* Second-level (flyout) submenu */
    ul.menu li ul li ul {
      top: 0;
      left: 100%;
    }

    ul.menu li:hover > ul {
      display: block;
    }

    ul.menu li ul li a {
      padding: 12px 16px;
    }

    ul.menu li ul li a:hover {
      background: #111;
    }

    /* For last level highlight */
    ul.menu li ul li ul li a:hover {
      background: white;
      color: black;
    }

    /* Add + sign for dropdown */
    li.has-submenu > a::after {
      content: " +";
      font-weight: bold;
    }
  </style>
</head>
<body>

  <ul class="menu">
    <li><a href="#">Home</a></li>
    <li><a href="#">WordPress</a></li>
    <li class="has-submenu">
      <a href="#">Web Design</a>
      <ul>
        <li><a href="#">Resource</a></li>
        <li><a href="#">Links</a></li>
        <li class="has-submenu">
          <a href="#">Tutorials</a>
          <ul>
            <li><a href="#">HTML/CSS</a></li>
            <li><a href="#">JQuery</a></li>
            <li class="has-submenu">
              <a href="#">Outher</a>
              <ul>
                <li><a href="#">Stuff</a></li>
                <li><a href="#">Things</a></li>
                <li><a href="#">Outher Stuff</a></li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </li>
    <li><a href="#">Inspiration</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">About</a></li>
  </ul>

</body>
</html>
