<html>
<head>
     <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" />

  <title>Flipkart</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f1f3f6; }
    .navbar { background: #fff; padding: 10px 30px; display: flex; align-items: center; }
    .logo { font-weight: bold; color: #2874f0; font-size: 22px; margin-right: 30px; }
    .search { flex: 0.9; padding: 0px;}
    .search input { width: 100%; padding: 8px; border-radius: 2px; border: 1px solid #ccc; }
    .nav-items { display: flex; gap: 20px; }
    .nav-items span { cursor: pointer; }
    .banner { background: #fffbe7; text-align: center; padding: 20px 0; font-size: 26px; font-weight: bold; }
    .categories { display: flex; justify-content: center; gap: 30px; background: #fff; padding: 15px 0; height: 100px; }
    .category { text-align: center; font-size: 14px; margin-top: 60px; position: relative;}
    .carousel { background: #222; color: #fff; text-align: center; padding: 40px 0; margin-top: 10px; }
    .input{ background-color: rgb(240, 244, 255);}
    .offerimg {margin-left: 400px; position: absolute;}
    #image1
    {
      margin-right: 1290px;
    }
    #image2
    {
      margin-top: -48px;
      margin-left: 115px;
    }
    
  </style>
</head>
<body>
  <div class="navbar">
    <span class="logo"><img src="flipkart.png" width="110px" height="40px"/></span>
    <div class="search">
      <input class="input" type="text" placeholder=" 🔍︎Search for Products, Brands and More">
    </div>
    <div class="nav-items">
      <span> 👨🏻‍💼 Login</span><!-- by emojidb-->
      <span>🛒 Cart</span>
      <span>🏪 Become a Seller</span>
    </div>
  </div>
  <!-- Banner -->
  <div class="banner"><img src="flipkart bannner.jpeg" width="1500px" height="150px"/></div>
  <!-- Conteent -->
  <div class="categories">
    <div class="offerimg">
     <img id="image1" src="offer.png" width="50px" height="50px"/>
     <img id="image2" src="mobile.png" width="25px" height="50px"/>

     </div>
    <div class="category">
        Top Offer
    </div>
    <div class="category">Mobiles & Tablets</div>
    <div class="category">TVs & Appliances</div>
    <div class="category">Electronics</div>
    <div class="category">Fashion</div>
    <div class="category">Beauty</div>
    <div class="category">Home & Kitchen</div>
    <div class="category">Furniture</div>
    <div class="category">Travel</div>
    <div class="category">Grocery</div>
  </div>
  <div class="carousel">
    <h2>BEARDO</h2>
    <p>Trending Hair Volumizing Wax<br>Up to 30% Off</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
