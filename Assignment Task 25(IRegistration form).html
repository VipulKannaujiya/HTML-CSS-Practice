<html>
    <head>
        <style>
            div
            {
                margin-bottom: 10px;
            }
            label
            {
                display: inline-block;
                width: 150px;
                text-align: left;
                margin-right: 10px;
            }
            input
            {
                display: inline-block;
            }
            .center-form
            {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .btn
            {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
            }
            button
            {
                background-color: blue;
                color: white;
            }
            button:hover
            {
                transform: scale(1.1);
                background-color: rgb(59, 255, 190);
                color: black;
                transition: 0.5s;
                width: 80px;
                height: 20px;
                border: 1px dashed black;
                border-radius: 50%;
            }
        </style>
    </head>
<body>
    <center>
    <h1> 25. </h1>

    <h2> Extended Registrationn Form </h2>
    <br/>

    <h3> Personal Information </h3>
        </center>
    <div class="center-form">
    <form>
        <b><label>First Name:</label></b>
        <input type="text" /><br/><br/>

        <b><label>Middle Name:</label></b>
        <input type="text" /><br/><br/>

        <b><label>Last Name:</label></b>
        <input type="text" /><br/><br/>

        <b><label>Email:</label></b>
        <input type="email" /><br/><br/>

        <b><label>Password</label></b>
        <input type="password" /><br/><br/>

        <b><label>Confirm Password</label></b>
        <input type="password" /><br/><br/>

        <b><label>Date Of Birth:</label></b>
        <input type="date" /><br/><br/>

        <b><label>Gender:</label></b>
        <input type="radio" name="gender"/>Male
        <input type="radio" name="gender"/>Female
        <input type="radio" name="gender"/>Other
        <br/><br/>

        <b><label>Phone Number:</label></b>
        <input type="number" /><br/><br/>

        <b><label>Alternate Phone:</label></b>
        <input type="number" /><br/><br/>

        <b><label>Nationality</label></b>
        <input type="text" /><br/><br/>

        <b><label>Marital Status:</label></b>
        <select>
            <option></option>
            <option>Single</option>
            <option>Married</option>
            <option>Can't Say</option>
        </select>
        <br/><br/>

        <b><label>Place Of Birth:</label></b>
        <input type="text" /><br/><br/>
    

    <h3 style="text-align: center; margin-bottom: 50px;"> Address Information </h3>

    <b><label>Address:</label></b>
    <textarea></textarea><br/><br/>

    <b><label>City:</label></b>
    <input type="text" /><br/><br/>

    <b><label>State:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Zip Code:</label></b>
    <input type="number" /><br/><br/>

    <b><label>Place Of Birth:</label></b>
    <select>
        <option>Select Country</option>
        <option>India</option>
        <option>Other</option>
    </select>
    <br/><br/>

    <h3 style="text-align: center;"> Academic Information </h3>

    <b><label>Education Level:</label></b>
    <select>
        <option>Select Level</option>
        <option>X</option>
        <option>XII</option>
        <option>Diploma</option>
        <option>Graduation</option>
        <option>Post Graduation</option>
    </select>
    <br/><br/>

    <b><label>Majosr/Field of Study:</label></b>
    <input type="text" /><br/><br/>

    <b><label>University/College:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Year Of Graduation:</label></b>
    <input type="text" /><br/><br/>

    <b><label>GPA:</label></b>
    <input type="number" /><br/><br/>

    <h3 style="text-align: center;"> Employment Information </h3>
    
    <b><label>Current Employer:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Job Title:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Year of Experience:</label></b>
    <select>
        <option>&nbsp;</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
        <option>9</option>
        <option>10</option>
        <option>10+</option>
    </select>
    <br/><br/>

    <b><label>Skills:</label></b>
    <input type="text" placeholder="E.g., Java, Python, Project"/><br/><br/>

    <h3 style="text-align: center;"> Additional Information </h3>

    <b><label>Languages Known:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Hobbies:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Linkedin Profile:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Personal Website:</label></b>
    <input type="text" /><br/><br/>

    <b><label>Availability for Interview:</label></b>
    <input type="text" placeholder="---:---  --"/><br/><br/>

    <b><label>Expected Salary:</label></b>
    <select>
        <option>&emsp;</option>
        <option>Less Than 10000</option>
        <option>20000</option>
        <option>30000</option>
        <option>40000</option>
        <option>50000</option>
        <option>60000</option>
        <option>70000</option>
        <option>80000</option>
        <option>90000</option>
        <option>100000</option>
        <option>Much Than 100000</option>
    </select>
    <br/><br/>

    <b><label>Willing To Relocate:</label></b>
    <input type="radio" name="location"/>Yes
    <input type="radio" name="location"/>No<br/><br/>

    <b><label>Available Start Date:</label></b>
    <input type="date" /><br/><br/>

    <b><label>Additional Comments:</label></b>
    <textarea>&emsp;&emsp;</textarea><br/><br/>

    <b><label>Subscribe to Newsletter:</label></b>
    <input type="checkbox" /><br/><br/>

    <b><label>Agree to Trems & Conditions:</label></b>
    <input type="checkbox" /><br/><br/>
    </form>
    </div>

    <div class="btn">
    <a href="#"><button>Register</button></a>
    <a href="#"><button>Reset</button></a>
    </div>
</body>
</html>
