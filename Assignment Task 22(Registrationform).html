<htnl>
    <head>
        <style>
            body
            {
                text-align: center;
                margin: 0px auto;
                
            }
            input
            {
                margin: 0px auto;
            }
            /* Input box ko ak line me karne ke liye*/
            div
            {
                margin-bottom: 10px;
            }
            label
            {
                display: inline-block;
                width: 120px;
            }
        </style>
    </head>
<body>
    <h1 style="text-align: center;"> 22. </h1>
    <h1> Registrationn Form </h1>
    <div><label>First Name:</label><input type="text" required/></div>
    
    <div><label>Last Name:</label><input type="text" required/></div>
    
    <div><label>Email:</label><input type="email" required/></div>
    
    <div><label>Password:</label><input type="password" required/></div>

    <div><label> Confirm Password:</label><input type="password" required/></div>
    
    <div><label>Date of Birth:</label><input type="date" required/></div>

    <div><label>Gender:</label><input type="radio" name="Gender"/>Male <input type="radio" name="Gender"/>Female <input type="radio" name="Gender"/>Other</div>

    <div><label>Phone Number:</label><input type="number" required/></div>

    <div><label>Address:</label><textarea rows="1" cols="20"></textarea></div>

    Country:
    <select single>
        <option>Uttar Pradesh</option>
        <option>Goa</option>
        <option>Gujrat</option>
        <option>Maharastra</option>
        <option>Bihar</option>
    </select><br/><br/><br/>

    <button>Register</button>
    <button>Reset</button>
</body>
</htnl>
